version: '3.9'

services:
  # Redis for BullMQ queues
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # GPS TCP Server
  gps-server:
    build:
      context: .
      dockerfile: apps/gps-server/Dockerfile
    ports:
      - "5000:5000"   # GPS TCP port
      - "3001:3001"   # Health check HTTP
    environment:
      - GPS_SERVER_PORT=5000
      - GPS_SERVER_HOST=0.0.0.0
      - HEALTH_PORT=3001
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Web App (development)
  web:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}

  # BullMQ Dashboard (development only)
  bull-board:
    image: node:20-alpine
    working_dir: /app
    command: npx @bull-board/cli --redis-url redis://redis:6379 --port 3002
    ports:
      - "3002:3002"
    depends_on:
      - redis

volumes:
  redis_data:
